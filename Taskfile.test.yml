version: '3'

silent: true

vars:
  PROJECT_NAME: '{{.PROJECT_NAME | default "tgbot"}}'
  TEST_PROJECT: '{{.PROJECT_NAME}}_test'
  COMPOSE_TEST_FILES: '-f compose.yaml -f compose.test.yaml'
  COMPOSE_DEV_FILES: '-f compose.yaml -f compose.dev.yaml'
  DUMP_FILE: '/tmp/tarot_oraculum_dump.sql'
  TEST_DB_NAME: '{{.TEST_DB_NAME | default "test_db"}}'
  TEST_DB_USER: '{{.TEST_DB_USER | default "test_user"}}'
  TEST_DB_PASSWORD: '{{.TEST_DB_PASSWORD | default "test_password"}}'
  OUTER_TEST_DB_PORT: '{{.OUTER_TEST_DB_PORT | default "15433"}}'
  POSTGRES_USER: '{{.POSTGRES_USER | default "django_user"}}'
  POSTGRES_DB: '{{.POSTGRES_DB | default "django_db"}}'

tasks:
  test-up:
    desc: Запустить тестовое окружение с загрузкой данных
    cmds:
      - |
        echo -e "\033[0;34m🧪 Запуск тестового окружения...\033[0m"
        echo -e "\033[0;34m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\033[0m"
        
        echo -e "\033[0;33m📦 Шаг 1/3: Запуск тестовой базы и Redis...\033[0m"
        docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} up -d db redis
        echo -e "\033[0;32m✅ База данных и Redis запущены\033[0m"
        echo -e "\033[0;34m⏳ Ожидание готовности базы (10 секунд)...\033[0m"
        sleep 10
        
        echo -e "\033[0;33m🔄 Шаг 2/3: Применение миграций Django...\033[0m"
        docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} run --build --rm web poetry run python manage.py migrate
        echo -e "\033[0;32m✅ Миграции применены\033[0m"
        
        echo -e "\033[0;33m📥 Шаг 3/3: Загрузка тестовых данных...\033[0m"
        if [ -f {{.DUMP_FILE}} ] && [ -s {{.DUMP_FILE}} ]; then
          LINES=$(wc -l < {{.DUMP_FILE}})
          if [ "$LINES" -gt 1 ]; then
            echo -e "\033[0;34m📋 Загружаю данные ($LINES строк)...\033[0m"
            docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} exec -T db \
              psql -U {{.TEST_DB_USER}} -d {{.TEST_DB_NAME}} < {{.DUMP_FILE}}
            echo -e "\033[0;32m✅ Данные загружены\033[0m"
            echo -e "\033[0;34m📊 Статистика:\033[0m"
            for table in tarot_tarotdeck tarot_tarotcard tarot_oraculumdeck tarot_oraculumitem; do
              count=$(docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} exec -T db \
                psql -U {{.TEST_DB_USER}} -d {{.TEST_DB_NAME}} -t -c "SELECT COUNT(*) FROM $table" 2>/dev/null | tr -d ' ')
              [ -n "$count" ] && echo "  ✅ $table: $count" || echo "  ⚠️  $table: нет"
            done
          else
            echo -e "\033[0;33m⚠️  Дамп пустой, данных нет\033[0m"
          fi
        else
          echo -e "\033[0;33m⚠️  Файл дампа не найден\033[0m"
        fi
        
        echo -e "\033[0;33m🚀 Запуск веб-сервера...\033[0m"
        docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} up -d web
        
        echo -e "\033[0;34m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\033[0m"
        echo -e "\033[0;32m🎉 Тестовое окружение готово!\033[0m"
        echo -e "\033[0;34m📋 Доступы:\033[0m"
        echo -e "  База: localhost:{{.OUTER_TEST_DB_PORT}} (пользователь: {{.TEST_DB_USER}}, база: {{.TEST_DB_NAME}})"
        echo -e "  Веб: http://localhost:8000"

  test-dump:
    desc: Снять дамп таблиц Таро и Оракула с dev базы
    cmds:
      - |
        echo -e "\033[0;33m📤 Снятие дампа с dev базы...\033[0m"
        echo -e "\033[0;34m🔍 Проверка dev базы...\033[0m"
        if ! docker compose {{.COMPOSE_DEV_FILES}} -p {{.PROJECT_NAME}} ps db 2>/dev/null | grep -q "Up"; then
          echo -e "\033[0;33m🚀 Запускаю dev базу...\033[0m"
          docker compose {{.COMPOSE_DEV_FILES}} -p {{.PROJECT_NAME}} up -d db
          echo -e "\033[0;34m⏳ Ожидание (10 секунд)...\033[0m"
          sleep 10
        else
          echo -e "\033[0;32m✅ Dev база уже запущена\033[0m"
        fi
        
        echo -e "\033[0;34m📋 Таблицы Таро и Оракула в dev базе:\033[0m"
        docker compose {{.COMPOSE_DEV_FILES}} -p {{.PROJECT_NAME}} exec -T db \
          psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} \
          -c "\dt" 2>/dev/null | grep -E "tarot" || echo "  ⚠️  Таблицы не найдены"
        
        echo -e "\033[0;34m📋 Создание дампа...\033[0m"
        docker compose {{.COMPOSE_DEV_FILES}} -p {{.PROJECT_NAME}} exec -T db \
          pg_dump -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} \
          --data-only --inserts --on-conflict-do-nothing \
          -t tarot_tarotdeck \
          -t tarot_tarotcard \
          -t tarot_tarotmeaningcategory \
          -t tarot_extendedmeaning \
          -t tarot_tarotcarditem \
          -t tarot_oraculumdeck \
          -t tarot_oraculumitem \
          > {{.DUMP_FILE}} 2>/dev/null
        if [ -s {{.DUMP_FILE}} ]; then
          echo -e "\033[0;32m✅ Дамп: {{.DUMP_FILE}} ($(wc -l < {{.DUMP_FILE}}) строк)\033[0m"
          head -3 {{.DUMP_FILE}}
        else
          echo -e "\033[0;33m⚠️  Дамп пуст! Проверьте имена таблиц в выводе выше\033[0m"
          echo "-- empty" > {{.DUMP_FILE}}
        fi

  test-down:
    desc: Остановить тестовое окружение
    cmds:
      - |
        echo -e "\033[0;33m🛑 Остановка тестового окружения...\033[0m"
        docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} down -v
        echo -e "\033[0;32m✅ Остановлено\033[0m"

  test-clean:
    desc: Полная очистка тестового окружения
    deps: [test-down]
    cmds:
      - |
        echo -e "\033[0;31m🧹 Удаление томов и дампа...\033[0m"
        docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} down -v 2>/dev/null || true
        rm -f {{.DUMP_FILE}}
        echo -e "\033[0;32m✅ Очищено\033[0m"

  test-init:
    desc: Полный цикл инициализации
    deps: [test-clean]
    cmds:
      - |
        echo -e "\033[0;34m🚀 Инициализация тестового окружения...\033[0m"
        echo -e "\033[0;34m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\033[0m"
        echo ""
        echo -e "\033[0;33m📋 Этап 1/2: Снятие дампа с dev базы\033[0m"
      - task: test-dump
      - |
        echo ""
        echo -e "\033[0;33m📋 Этап 2/2: Запуск тестового окружения\033[0m"
      - task: test-up
      - |
        echo ""
        echo -e "\033[0;32m✅ Готово!\033[0m"

  test-status:
    desc: Статус тестового окружения
    cmds:
      - |
        echo -e "\033[0;34m📊 Статус тестового окружения:\033[0m"
        docker compose {{.COMPOSE_TEST_FILES}} -p {{.TEST_PROJECT}} ps 2>/dev/null || echo -e "\033[0;33mНе запущено\033[0m"