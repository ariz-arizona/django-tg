version: '3.8'

x-labels: &app_labels
  labels:
    project_name: ${PROJECT_NAME:-djangotg}

x-common-settings: &common_settings
  build:
    context: ./app
    dockerfile: Dockerfile
  volumes:
    - ./.env:/app/.env  # Примонтируем файл .env в контейнер
    - static_volume:/app/static  # Монтируем том для статики
  env_file:
    - .env
  <<: *app_labels
  depends_on:
    - db
    - redis

services:
  web:
    <<: *common_settings
    container_name: ${PROJECT_NAME:-djangotg}_web
    command: gunicorn server.wsgi:application --bind 0.0.0.0:8000


  celery:
    <<: *common_settings
    container_name: ${PROJECT_NAME:-djangotg}_celery_worker
    command: poetry run celery -A server worker --loglevel=info

  celery_beat:
    <<: *common_settings
    container_name: ${PROJECT_NAME:-djangotg}_celery_beat
    command: poetry run celery -A server beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  redis:
    image: redis:7
    container_name: ${PROJECT_NAME:-djangotg}_redis
    <<: *app_labels
  db:
    image: postgres:15
    container_name: ${PROJECT_NAME:-djangotg}_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    <<: *app_labels

  nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME:-djangotg}_nginx
    ports:
      - "${NGINX_PORT:-80}:80"  # Если переменная не задана, по умолчанию 80
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/static  # Монтируем том для статики
    depends_on:
      - web
    <<: *app_labels

  dozzle:
    image: amir20/dozzle:latest
    container_name: ${PROJECT_NAME:-djangotg}_dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Доступ к Docker socket для Dozzle
    environment:
      DOZZLE_FILTER: label=project_name=${PROJECT_NAME:-djangotg}
    read_only: true  # Только для чтения
    depends_on:
      - web
      - celery
      - celery_beat
      - redis
      - db
    <<: *app_labels

volumes:
  postgres_data:
  static_volume:  # Общий том для статики